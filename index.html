<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pediaboy Store</title>
    <style>
        /* =========================================
           1. Pengaturan Dasar & Dark Mode
           ========================================= */
        body {
            background-color: #050505; /* Warna latar sangat gelap (Deep Dark) */
            color: #ffffff; /* Teks berwarna putih agar kontras */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden; /* Mencegah geser kanan-kiri yang tidak disengaja di HP */
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        /* Efek Teks Neon Cyan */
        h1 {
            font-size: 2.5rem;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff;
            margin: 0;
        }

        p.subtitle {
            color: #a0a0a0;
            font-size: 1rem;
        }

        /* =========================================
           2. Pengaturan Bento Grid
           ========================================= */
        .bento-grid {
            display: grid;
            grid-template-columns: 1fr; /* 1 kolom untuk tampilan mobile (HP) */
            gap: 20px; /* Jarak antar kotak harga */
            max-width: 400px; /* Lebar maksimal menyerupai layar HP pada umumnya */
            margin: 0 auto; /* Posisi otomatis di tengah layar */
        }

        /* =========================================
           3. Desain Kotak (Card) & Efek Motion Blur
           ========================================= */
        .bento-item {
            background-color: #121212;
            border: 1px solid #1a1a1a;
            border-radius: 24px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            
            /* Durasi animasi diatur agar efek blur terlihat jelas dan halus */
            transition: transform 0.6s ease-out, opacity 0.6s ease-out, filter 0.6s ease-out, box-shadow 0.3s ease;
            
            /* Persiapan Animasi: Tembus pandang, posisi di bawah, dan buram (blur) */
            opacity: 0;
            transform: translateY(40px); 
            filter: blur(10px); 
        }

        /* Efek saat kotak disentuh/di-hover (memancar neon) */
        .bento-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4); 
            border-color: #00ffff;
        }

        /* Kelas untuk memicu animasi saat kotak masuk ke layar */
        .bento-item.show {
            opacity: 1; /* Menjadi terlihat sepenuhnya */
            transform: translateY(0); /* Kembali ke posisi semula */
            filter: blur(0); /* Blur menghilang menjadi sangat tajam */
        }

        /* =========================================
           4. Desain Harga dan Tombol E-Wallet
           ========================================= */
        .price {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffffff;
            margin: 15px 0;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        /* Tombol QRIS dengan pendaran neon */
        .btn-qris {
            background-color: #00ffff;
            color: #000000;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.6);
        }

        /* Tombol Telegram */
        .btn-telegram {
            background-color: #2AABEE; /* Warna biru khas Telegram */
            color: white;
        }
    </style>
</head>
<body>

    <!-- Bagian Judul Halaman -->
    <header>
        <h1>PEDIABOY</h1>
        <p class="subtitle">Futuristic Digital Catalog</p>
    </header>

    <!-- Bagian Daftar Harga -->
    <div class="bento-grid">
        <!-- Kotak Harga 1 -->
        <div class="bento-item">
            <h3>Paket Pemula</h3>
            <div class="price">Rp 100.000</div>
            <p style="color: #888; font-size: 0.9rem;">Akses fitur dasar dan panduan.</p>
            <button class="btn btn-qris">Bayar via QRIS</button>
            <button class="btn btn-telegram">Telegram Invoice</button>
        </div>

        <!-- Kotak Harga 2 -->
        <div class="bento-item">
            <h3>Paket Pro</h3>
            <div class="price">Rp 1.500.000</div>
            <p style="color: #888; font-size: 0.9rem;">Akses penuh + dukungan prioritas.</p>
            <button class="btn btn-qris">Bayar via QRIS</button>
            <button class="btn btn-telegram">Telegram Invoice</button>
        </div>

        <!-- Kotak Harga 3 -->
        <div class="bento-item">
            <h3>Paket Ultimate</h3>
            <div class="price">Rp 3.000.000</div>
            <p style="color: #888; font-size: 0.9rem;">Lisensi tak terbatas & aset premium.</p>
            <button class="btn btn-qris">Bayar via QRIS</button>
            <button class="btn btn-telegram">Telegram Invoice</button>
        </div>
    </div>

    <!-- =========================================
         5. JavaScript untuk Animasi Scroll
         ========================================= -->
    <script>
        // Mencari semua elemen yang memiliki kelas 'bento-item'
        const items = document.querySelectorAll('.bento-item');

        // Membuat pemantau (observer) untuk mendeteksi pergerakan scroll
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                // Jika kotak harga sudah mulai masuk dan terlihat di layar HP
                if (entry.isIntersecting) {
                    // Tambahkan kelas 'show' untuk menjalankan animasi blur menjadi tajam
                    entry.target.classList.add('show'); 
                }
            });
        }, {
            // Memicu animasi saat 10% bagian kotak sudah terlihat di layar
            threshold: 0.1 
        });

        // Memerintahkan observer untuk mengawasi setiap kotak harga satu per satu
        items.forEach(item => {
            observer.observe(item);
        });
    </script>
</body>
</html>
